<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>magic™ — Product configurator</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="configurator.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components/TopNav.jsx"></script>
<script type="text/babel" src="components/QuoteForm.jsx"></script>
<script type="text/babel" src="components/ConfiguratorSidebar.jsx"></script>
<script type="text/babel" src="components/OptionTile.jsx"></script>
<script type="text/babel" src="components/Configurator.jsx"></script>

<script type="text/babel">
function App() {
  const [submitted, setSubmitted] = React.useState(false);
  return (
    <div className="mw-app" data-screen-label="Configurator">
      <TopNav active="configurator" />
      <Configurator onSubmit={() => setSubmitted(true)} />

      {submitted && (
        <div className="mw-modal" onClick={() => setSubmitted(false)}>
          <div className="mw-modal__card" onClick={(e) => e.stopPropagation()}>
            <button className="mw-modal__close" onClick={() => setSubmitted(false)}>×</button>
            <QuoteForm onSubmit={() => setTimeout(() => setSubmitted(false), 1800)} />
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
