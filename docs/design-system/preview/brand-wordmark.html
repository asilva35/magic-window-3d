<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 0; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; height: 220px; }
  .pane { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
  .dark  { background: #001B70; color: #fff; }
  .light { background: #fff;    color: #001B70; }
  .mark { font-family: var(--font-display); font-weight: 900; font-size: 92px; line-height: 1; letter-spacing: -0.05em; }
  .meta { font-family: var(--font-body); font-size: 11px; opacity: 0.7; }
</style>
</head>
<body>
  <div class="card">
    <div class="pane dark">
      <div class="mark">magic</div>
      <div class="meta">white on Dark Blue · primary lockup</div>
    </div>
    <div class="pane light">
      <div class="mark">magic</div>
      <div class="meta">Dark Blue on white</div>
    </div>
  </div>
</body>
</html>
