<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Type: Sub-headings</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; color: var(--magic-dark-blue); }
  .row { display: flex; align-items: baseline; gap: 20px; }
  .specimen { font-family: var(--font-display); font-weight: 400; line-height: 1; color: var(--magic-dark-blue); }
  .meta { font-family: var(--font-body); font-size: 11px; opacity: 0.6; }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><div class="specimen" style="font-size:60px">Sub-heading 1</div></div>
    <div class="meta">60 px / Mulish Regular (Harmonia Sans Pro Regular)</div>
    <div class="row"><div class="specimen" style="font-size:34px">Sub-heading 2</div><div class="meta">34 / Regular</div></div>
    <div class="row"><div class="specimen" style="font-size:28px">Sub-heading 3</div><div class="meta">28 / Regular</div></div>
    <div class="row"><div class="specimen" style="font-size:20px">Sub-heading 4</div><div class="meta">20 / Regular</div></div>
    <div class="row"><div class="specimen" style="font-size:16px">Sub-heading 5</div><div class="meta">16 / Regular</div></div>
  </div>
</body>
</html>
