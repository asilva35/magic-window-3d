<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; color: var(--magic-dark-blue); font-family: var(--font-display); }
  .card { padding: 22px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 10px; }
  .row { display: grid; grid-template-columns: 90px 1fr 80px; align-items: center; gap: 16px; }
  .name { font-weight: 700; font-size: 13px; }
  .bar { height: 12px; background: #001B70; border-radius: 2px; }
  .px { font-family: var(--font-body); font-size: 11px; opacity: 0.6; text-align: right; }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><div class="name">space-1</div><div class="bar" style="width: 4px"></div><div class="px">4 px</div></div>
    <div class="row"><div class="name">space-2</div><div class="bar" style="width: 8px"></div><div class="px">8 px</div></div>
    <div class="row"><div class="name">space-3</div><div class="bar" style="width: 12px"></div><div class="px">12 px</div></div>
    <div class="row"><div class="name">space-4</div><div class="bar" style="width: 16px"></div><div class="px">16 px</div></div>
    <div class="row"><div class="name">space-5</div><div class="bar" style="width: 21px"></div><div class="px">21 px</div></div>
    <div class="row"><div class="name">space-6</div><div class="bar" style="width: 24px"></div><div class="px">24 px</div></div>
    <div class="row"><div class="name">space-7</div><div class="bar" style="width: 31px"></div><div class="px">31 px</div></div>
    <div class="row"><div class="name">space-8</div><div class="bar" style="width: 40px"></div><div class="px">40 px</div></div>
    <div class="row"><div class="name">space-9</div><div class="bar" style="width: 48px"></div><div class="px">48 px</div></div>
  </div>
</body>
</html>
