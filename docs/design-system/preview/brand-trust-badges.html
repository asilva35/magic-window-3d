<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Trust badges</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; }
  .card { padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 14px; align-items: center; }
  .label { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--magic-dark-blue); letter-spacing: 0.06em; }
  .strip { display: flex; gap: 28px; align-items: center; justify-content: center; flex-wrap: wrap; }
  .strip img { height: 44px; width: auto; opacity: 0.9; }
</style>
</head>
<body>
  <div class="card">
    <div class="label">Proven. Trusted. Awarded.</div>
    <div class="strip">
      <img src="../assets/golf-canada.svg" alt="Golf Canada" />
      <img src="../assets/google-review.svg" alt="Google Review" />
      <img src="../assets/ontario-made.svg" alt="Ontario Made" />
      <img src="../assets/toronto-star.svg" alt="Toronto Star" />
      <img src="../assets/window-awards.svg" alt="Window Awards" />
    </div>
  </div>
</body>
</html>
