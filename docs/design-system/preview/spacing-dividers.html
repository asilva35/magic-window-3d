<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Dividers & lines</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; color: var(--magic-dark-blue); font-family: var(--font-display); }
  .card { padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; }
  .row { display: grid; grid-template-columns: 130px 1fr; align-items: center; gap: 16px; }
  .label { font-size: 12px; font-weight: 700; }
  .meta  { font-family: var(--font-body); font-size: 10px; opacity: 0.55; margin-top: 6px; }
  .l1 { height: 1px; background: #ADADAD; }
  .l2 { height: 1px; background: #E1E1E1; }
  .l3 { height: 2px; background: #6AC3E7; width: 64px; }
  .l4 { height: 1px; background: #001B70; }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><div class="label">Section divider</div>
      <div><div class="l1"></div><div class="meta">1 px · #ADADAD · between major sections</div></div></div>
    <div class="row"><div class="label">Hairline</div>
      <div><div class="l2"></div><div class="meta">1 px · #E1E1E1 · inside cards / between fields</div></div></div>
    <div class="row"><div class="label">Accent</div>
      <div><div class="l3"></div><div class="meta">2 px · #6AC3E7 · short accent under eyebrow</div></div></div>
    <div class="row"><div class="label">Strong rule</div>
      <div><div class="l4"></div><div class="meta">1 px · #001B70 · button border / navy emphasis</div></div></div>
  </div>
</body>
</html>
