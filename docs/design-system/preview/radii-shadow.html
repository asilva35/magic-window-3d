<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Radii & shadow</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; color: var(--magic-dark-blue); font-family: var(--font-display); }
  .card { padding: 24px 28px; box-sizing: border-box; display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .chip { width: 64px; height: 64px; background: #001B70; }
  .label { font-size: 11px; opacity: 0.7; }
  .name  { font-weight: 700; font-size: 13px; }
  .shadow-chip { background: #fff; border: 1px solid #f0f0f0; }
  .sm { box-shadow: 0 1px 2px rgba(0,27,112,0.06), 0 1px 1px rgba(0,27,112,0.04); }
  .md { box-shadow: 0 4px 16px rgba(0,27,112,0.08), 0 1px 2px rgba(0,27,112,0.04); }
  .lg { box-shadow: 0 12px 40px rgba(0,27,112,0.14); }
</style>
</head>
<body>
  <div class="card">
    <div class="item"><div class="chip" style="border-radius: 3px"></div><div class="name">3 px</div><div class="label">inputs · Submit C</div></div>
    <div class="item"><div class="chip" style="border-radius: 5px"></div><div class="name">5 px</div><div class="label">primary buttons</div></div>
    <div class="item"><div class="chip" style="border-radius: 8px"></div><div class="name">8 px</div><div class="label">soft gradient surf.</div></div>
    <div class="item"><div class="chip shadow-chip sm" style="border-radius: 5px"></div><div class="name">shadow-sm</div><div class="label">subtle elevation</div></div>
    <div class="item"><div class="chip shadow-chip md" style="border-radius: 5px"></div><div class="name">shadow-md</div><div class="label">floating</div></div>
  </div>
</body>
</html>
