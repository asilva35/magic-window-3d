<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Magic — Type: Display scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: #fff; font-family: var(--font-body); color: var(--magic-dark-blue); }
  .card { padding: 24px 28px; box-sizing: border-box; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; align-items: baseline; gap: 24px; }
  .specimen { font-family: var(--font-display); font-weight: 900; line-height: 1; color: var(--magic-dark-blue); white-space: nowrap; }
  .meta { font-family: var(--font-body); font-size: 11px; color: var(--magic-dark-blue); opacity: 0.65; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><div class="specimen" style="font-size:64px">Aa</div><div class="meta">H1 · 64 / Mulish Black</div></div>
    <div class="row"><div class="specimen" style="font-size:50px">Aa</div><div class="meta">H2 · 50 / Black</div></div>
    <div class="row"><div class="specimen" style="font-size:40px">Aa</div><div class="meta">H3 · 40 / Black</div></div>
    <div class="row"><div class="specimen" style="font-size:34px">Aa</div><div class="meta">H4 · 34 / Black</div></div>
    <div class="row"><div class="specimen" style="font-size:24px">Aa</div><div class="meta">H5 · 24 / Black</div></div>
  </div>
</body>
</html>
